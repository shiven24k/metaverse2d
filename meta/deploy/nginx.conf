map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# API + WebSocket server (api.your-domain.com)
# All traffic (HTTP REST and WS upgrades) proxies to the single Node process on 3000.
server {
    listen 80;
    server_name api.your-domain.com;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }
}

# Frontend static file server (your-domain.com / www.your-domain.com)
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    root /opt/metaverse2d/meta/apps/frontend/dist;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache game assets (tiles, sprites, avatars, items) for 30 days
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache JS/CSS bundles (Vite hashes them, so long cache is safe)
    location ~* \.(js|css)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
